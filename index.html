<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>价格记录</title>
    <meta name="theme-color" content="#0f766e">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">本地保存</p>
          <h1>价格记录</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="exportCsvButton" type="button">导出 CSV</button>
          <button class="ghost-button" id="exportJsonButton" type="button">备份 JSON</button>
          <label class="ghost-button file-button" for="importFile">导入</label>
          <input id="importFile" type="file" accept=".json,.csv,text/csv,application/json">
        </div>
      </header>

      <section class="workspace" aria-label="价格记录工作区">
        <form class="entry-panel" id="recordForm">
          <div class="panel-head">
            <div>
              <p class="eyebrow">新增记录</p>
              <h2 id="formTitle">买过的价格</h2>
            </div>
            <button class="ghost-button hidden" id="cancelEditButton" type="button">取消编辑</button>
          </div>

          <input id="recordId" type="hidden">

          <div class="field-grid">
            <label>
              <span>日期</span>
              <input id="dateInput" type="date" required>
            </label>
            <label>
              <span>产品</span>
              <input id="productInput" type="text" list="productList" placeholder="牛奶 / 咖啡豆 / 衣服" required>
            </label>
            <label>
              <span>品牌/规格</span>
              <input id="brandInput" type="text" list="brandList" placeholder="不同品牌或规格请写清楚">
            </label>
            <label>
              <span>店铺</span>
              <input id="storeInput" type="text" list="storeList" placeholder="淘宝 / Shopee / Lazada">
            </label>
            <label>
              <span>分类</span>
              <select id="categoryPresetInput">
                <option value="">选择分类</option>
                <option value="食品饮料">食品饮料</option>
                <option value="生鲜冷冻">生鲜冷冻</option>
                <option value="零食甜品">零食甜品</option>
                <option value="日常用品">日常用品</option>
                <option value="清洁用品">清洁用品</option>
                <option value="个护美妆">个护美妆</option>
                <option value="家居厨房">家居厨房</option>
                <option value="服饰鞋包">服饰鞋包</option>
                <option value="数码电器">数码电器</option>
                <option value="药品保健">药品保健</option>
                <option value="宠物用品">宠物用品</option>
                <option value="交通出行">交通出行</option>
                <option value="订阅服务">订阅服务</option>
                <option value="推推专类">推推专类</option>
                <option value="其他">其他</option>
                <option value="__custom">自定义分类...</option>
              </select>
              <input id="categoryInput" type="hidden">
            </label>
            <label class="custom-category-field hidden" id="categoryCustomField">
              <span>自定义分类</span>
              <input id="categoryCustomInput" type="text" list="categoryList" placeholder="输入新的分类">
            </label>
            <label>
              <span>实付总价</span>
              <input id="priceInput" type="number" min="0" step="0.01" placeholder="0.00" required>
            </label>
            <label>
              <span>币种</span>
              <select id="currencyInput">
                <option value="CNY">人民币 CNY</option>
                <option value="SGD">新加坡币 SGD</option>
              </select>
            </label>
            <label>
              <span>数量</span>
              <input id="quantityInput" type="number" min="0.0001" step="0.0001" value="1" required>
            </label>
            <label>
              <span>单位</span>
              <select id="unitPresetInput">
                <option value="">选择单位</option>
                <option value="件">件</option>
                <option value="个">个</option>
                <option value="包">包</option>
                <option value="盒">盒</option>
                <option value="瓶">瓶</option>
                <option value="袋">袋</option>
                <option value="罐">罐</option>
                <option value="条">条</option>
                <option value="支">支</option>
                <option value="片">片</option>
                <option value="卷">卷</option>
                <option value="kg">kg</option>
                <option value="g">g</option>
                <option value="L">L</option>
                <option value="ml">ml</option>
                <option value="lb">lb</option>
                <option value="oz">oz</option>
                <option value="次">次</option>
                <option value="月">月</option>
                <option value="__custom">自定义单位...</option>
              </select>
              <input id="unitInput" type="hidden" value="件">
            </label>
            <label class="custom-unit-field hidden" id="unitCustomField">
              <span>自定义单位</span>
              <input id="unitCustomInput" type="text" list="unitList" placeholder="输入新的单位">
            </label>
          </div>

          <label class="wide-field">
            <span>优惠说明</span>
            <input id="discountInput" type="text" placeholder="30% OFF / 2个2.99 / 满100减20 / Voucher">
          </label>

          <label class="wide-field">
            <span>备注</span>
            <textarea id="noteInput" rows="3" placeholder="口味、型号、是否含税、物流费等"></textarea>
          </label>

          <datalist id="productList"></datalist>
          <datalist id="brandList"></datalist>
          <datalist id="storeList"></datalist>
          <datalist id="categoryList"></datalist>
          <datalist id="unitList">
            <option value="件"></option>
            <option value="个"></option>
            <option value="包"></option>
            <option value="盒"></option>
            <option value="瓶"></option>
            <option value="kg"></option>
            <option value="g"></option>
            <option value="L"></option>
            <option value="ml"></option>
          </datalist>

          <div class="form-footer">
            <p id="liveUnitPrice">单价会在保存后自动计算。</p>
            <button class="primary-button" id="saveButton" type="submit">保存记录</button>
          </div>
        </form>

        <section class="insight-panel" aria-label="当前促销对比">
          <div class="panel-head">
            <div>
              <p class="eyebrow">下次打折时</p>
              <h2>快速对比</h2>
            </div>
          </div>
          <div class="compare-grid">
            <label>
              <span>搜索产品</span>
              <input id="compareProductInput" type="text" list="productList" placeholder="输入要比较的商品">
            </label>
            <label>
              <span>当前实付</span>
              <input id="currentPriceInput" type="number" min="0" step="0.01" placeholder="0.00">
            </label>
            <label>
              <span>当前币种</span>
              <select id="currentCurrencyInput">
                <option value="CNY">人民币 CNY</option>
                <option value="SGD">新加坡币 SGD</option>
              </select>
            </label>
            <label>
              <span>当前数量</span>
              <input id="currentQuantityInput" type="number" min="0.0001" step="0.0001" value="1">
            </label>
            <label>
              <span>当前单位</span>
              <select id="currentUnitPresetInput">
                <option value="">选择单位</option>
                <option value="件">件</option>
                <option value="个">个</option>
                <option value="包">包</option>
                <option value="盒">盒</option>
                <option value="瓶">瓶</option>
                <option value="袋">袋</option>
                <option value="罐">罐</option>
                <option value="条">条</option>
                <option value="支">支</option>
                <option value="片">片</option>
                <option value="卷">卷</option>
                <option value="kg">kg</option>
                <option value="g">g</option>
                <option value="L">L</option>
                <option value="ml">ml</option>
                <option value="lb">lb</option>
                <option value="oz">oz</option>
                <option value="次">次</option>
                <option value="月">月</option>
                <option value="__custom">自定义单位...</option>
              </select>
              <input id="currentUnitInput" type="hidden" value="件">
            </label>
            <label class="custom-unit-field hidden" id="currentUnitCustomField">
              <span>自定义当前单位</span>
              <input id="currentUnitCustomInput" type="text" list="unitList" placeholder="输入新的单位">
            </label>
          </div>
          <div class="comparison-result" id="comparisonResult">
            先搜索商品，再输入这次促销的实付价。
          </div>
          <div class="stats-grid" id="statsGrid">
            <article>
              <span>购买次数</span>
              <strong>0</strong>
            </article>
            <article>
              <span>最低单价</span>
              <strong>-</strong>
            </article>
            <article>
              <span>平均单价</span>
              <strong>-</strong>
            </article>
            <article>
              <span>最近购买</span>
              <strong>-</strong>
            </article>
          </div>

          <div class="exchange-panel">
            <div class="exchange-head">
              <div>
                <p class="eyebrow">汇率</p>
                <strong id="rateSummary">SGD/CNH -</strong>
              </div>
              <button class="ghost-button" id="refreshRateButton" type="button">刷新</button>
            </div>
            <div class="exchange-grid">
              <label>
                <span>显示币种</span>
                <select id="displayCurrencyInput">
                  <option value="CNY">人民币 CNY</option>
                  <option value="SGD">新加坡币 SGD</option>
                </select>
              </label>
              <label>
                <span>1 SGD 等于</span>
                <input id="rateInput" type="number" min="0" step="0.0001" placeholder="SGD/CNH">
              </label>
            </div>
            <p class="rate-status" id="rateStatus">汇率会自动尝试更新。</p>
          </div>
        </section>
      </section>

      <section class="history-panel" aria-label="商品档案">
        <div class="history-head">
          <div>
            <p class="eyebrow">商品档案</p>
            <h2>点击商品查看购买记录</h2>
          </div>
          <div class="history-controls">
            <input id="searchInput" type="search" placeholder="搜索产品、品牌、店铺、优惠或备注">
            <select id="categoryFilter" aria-label="按分类筛选">
              <option value="">全部分类</option>
            </select>
            <select id="sortSelect" aria-label="排序">
              <option value="recent-desc">最近购买</option>
              <option value="unit-asc">单价最低</option>
              <option value="unit-desc">单价最高</option>
              <option value="name-asc">产品 A-Z</option>
              <option value="count-desc">购买次数</option>
            </select>
          </div>
        </div>

        <section class="detail-panel hidden" id="productDetail" aria-label="商品购买记录">
          <div class="detail-head">
            <div>
              <p class="eyebrow">商品详情</p>
              <h3 id="detailTitle">-</h3>
              <p id="detailMeta">-</p>
            </div>
            <div class="detail-actions">
              <button class="ghost-button" id="addForProductButton" type="button">新增这件商品</button>
              <button class="ghost-button" id="closeDetailButton" type="button">关闭</button>
            </div>
          </div>
          <div class="detail-stats" id="detailStats"></div>
          <div class="table-wrap detail-table-wrap">
            <table class="detail-table">
              <thead>
                <tr>
                  <th>日期</th>
                  <th>店铺</th>
                  <th>实付</th>
                  <th>数量</th>
                  <th>单价</th>
                  <th>优惠说明</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="detailRecordsBody"></tbody>
            </table>
          </div>
        </section>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>产品</th>
                <th>购买次数</th>
                <th>历史最低</th>
                <th>平均单价</th>
                <th>最近购买</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="groupsBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState">
            还没有记录。先把最近一次购买填进去，下一次打折时就能直接比较。
          </div>
        </div>
      </section>
    </main>

    <template id="groupRowTemplate">
      <tr class="group-row" tabindex="0">
        <td data-label="产品"></td>
        <td data-label="购买次数"></td>
        <td data-label="历史最低"></td>
        <td data-label="平均单价"></td>
        <td data-label="最近购买"></td>
        <td data-label="操作" class="row-actions"></td>
      </tr>
    </template>

    <template id="detailRowTemplate">
      <tr>
        <td data-label="日期"></td>
        <td data-label="店铺"></td>
        <td data-label="实付"></td>
        <td data-label="数量"></td>
        <td data-label="单价"></td>
        <td data-label="优惠说明"></td>
        <td data-label="操作" class="row-actions"></td>
      </tr>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
